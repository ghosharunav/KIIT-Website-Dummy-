<!DOCTYPE html>
<html>
<head>
    <title>KIIT Header</title>

    <style>
        body {
            margin: 0;
            background-color: rgb(245, 249, 245);
            font-family: Arial, sans-serif;
        }

        .header {
            display: table;
            width: 100%;
            height: 100%;
        }

        .logo {
            display: table-cell;
            width: 120px;
            vertical-align: middle;
            text-align: center;
        }

        .logo img {
            width: 80px;
            height: 80px;
        }

        .title {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
        }

        .title h1 {
            margin: 0;
            font-size: 30px;
            color: rgb(11, 124, 11);
        }

        .title p {
            margin: 5px 0 0 0;
            font-size: 17px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">
            <img src="Screenshot 2025-12-14 125004.png" alt="KIIT Logo">
        </div>

        <div class="title">
            <h1>Kalinga Institute of Industrial Technology (KIIT)</h1>
            <p>Excellence in Education & Research</p>
        </div>
    </div>
</body>
</html>
